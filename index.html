<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice</title>
</head>
<body>
    <h1>Switch Statement</h1>

    <button class="btn btn-info" onclick="teamRank()">Rank</button>

    <script>
        function teamRank(){
            var rank = "1st";

            var message = "";

            switch(true){
                case (rank === "1st"):
                    message = "Champions!";
                    break;
                case (rank === "2nd"):
                    message = "Second Placer!";
                    break;
                case (rank === "3rd"):
                    message = "Third Placer!";
                    break;
                case (rank === "4th"):
                    message = "Fourth Placer!";
                    break;
                default:
                    message = "Rank could not be determined.";

            }
            alert(message);
        }

        let team = "Green";//string

        switch(team){
            case "Green":
                alert("Go Green Hornets!");
                break;
            case "Blue":
                alert("Go Blue Bears!");
                break;
            case "Red":
                alert("Go Red Bulldogs!");
                break;
            case "Yellow":
                alert("Go Yellow Tigers!");
                break;
            default:
                alert("No Team Name.")
        }

    </script>
    
</body>
</html>
